type: object
properties:
  access_token:
    type: string
    description: Short-lived JWT (60 min)
    example: eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9...
  token_type:
    type: string
    example: bearer
  expires_in:
    type: integer
    description: Access token lifetime in seconds
    example: 3600
