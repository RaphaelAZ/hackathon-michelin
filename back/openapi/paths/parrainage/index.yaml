get:
  tags:
    - Parrainage
  summary: Get referral dashboard
  description: Returns the authenticated user's referral code and the list of their godchildren (filleuls).
  operationId: parrainageIndex
  security:
    - accessToken: []
  responses:
    '200':
      description: Referral dashboard
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Referral'
    '401':
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
