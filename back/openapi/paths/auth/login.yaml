post:
  tags:
    - Authentication
  summary: Login
  operationId: authLogin
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
            - password
          properties:
            email:
              type: string
              format: email
              example: user@example.com
            password:
              type: string
              format: password
              example: password
  responses:
    '200':
      description: Successful login
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/TokenResponse'
    '401':
      description: Invalid credentials
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    '422':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationError'
