post:
  tags:
    - Authentication
  summary: Logout
  operationId: authLogout
  security:
    - accessToken: []
  responses:
    '200':
      description: Successfully logged out
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Successfully logged out
    '401':
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
