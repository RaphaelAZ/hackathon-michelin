<header class="header">
  <div class="container header__inner">
    <a routerLink="/" class="header__logo" aria-label="Michelin Vélo — Accueil">
      <svg class="header__logo-img" viewBox="0 0 160 36" width="160" height="36" aria-hidden="true">
        <use href="assets/images/common/sprite-logos.svg#logo-brand" fill="currentColor"></use>
      </svg>
    </a>

    <nav class="header__nav" aria-label="Navigation principale">
      <a routerLink="/" routerLinkActive="header__link--active" [routerLinkActiveOptions]="{ exact: true }" class="header__link">
        Accueil
      </a>
      <a routerLink="/pneus" routerLinkActive="header__link--active" class="header__link">
        Nos pneus
      </a>
      @if (authStore.isAuthenticated()) {
        <a routerLink="/parrainage" routerLinkActive="header__link--active" class="header__link">
          Parrainage
        </a>
      }
    </nav>

    @if (currentUser(); as user) {
      <div class="header__account">
        <span class="header__account-name">{{ user.name }}</span>
        <button type="button" class="header__logout-btn" (click)="logout()">
          Se déconnecter
        </button>
      </div>
    } @else {
      <a routerLink="/auth" class="header__auth-link" routerLinkActive="header__link--active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2" />
          <path d="M4 20c0-4 3.582-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
        </svg>
        Se connecter
      </a>
    }

  </div>
</header>
