<div class="form-field">
  @if (label()) {
    <label [for]="inputId()" class="form-field__label">
      {{ label() }}
      @if (required()) {
        <span class="form-field__required" aria-hidden="true">*</span>
      }
    </label>
  }
  <ng-content />
  @if (error()) {
    <p class="form-field__error" role="alert">{{ error() }}</p>
  } @else if (hint()) {
    <p class="form-field__hint">{{ hint() }}</p>
  }
</div>
